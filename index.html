著，在设计的经纬里寻找平衡。",categories:[{id:"profile",title:"个人简介",icon:"User",subtitle:"跨界设计师 / 视觉艺术家",sections:[{title:"核心理念",content:"我是 PengWen，一名深耕设计领域的跨界创作者。我相信设计不仅仅是视觉的传达，更是灵魂与空间的对话。我致力于通过极简的语言，赋予作品独特的生命力。"},{title:"执业原则",content:"在过去十年的职业生涯中，我始终坚持“Less is More”的原则。每一条线条、每一种色彩的选择，都是为了精准地捕捉品牌的核心价值。我不仅关注美学，更关注作品背后的逻辑与温度。"}],fontSize:"text-2xl"},{id:"skills",title:"技术能力",icon:"Code2",subtitle:"设计工具 & 前端技术",sections:[{title:"技术能力",content:"熟练掌握 Figma, Adobe Creative Suite 等设计工具。具有扎实的 UI/UX 设计基础，能够独立完成从原型设计到高保真输出的全流程。同时对前端技术如 React, Tailwind CSS 有深度理解。"},{title:"创意实现",content:"我擅长利用技术手段将创意具象化。无论是响应式布局的精妙计算，还是微交互动画的像素级打磨，都是我引以为傲的技能。我不仅是在画图，更是在构建交互的逻辑。"}],fontSize:"text-2xl"},{id:"experience",title:"工作经历",icon:"Briefcase",subtitle:"职业历程 & 项目经验",sections:[{title:"行业深耕",content:"曾在顶尖设计事务所担任 UI 设计师，主导过多个百万级用户的移动端项目。拥有丰富的品牌视觉升级经验，擅长通过设计提升商业价值。"},{title:"协作领导",content:"我深知如何在跨团队协作中发挥设计的协调作用，确保最终产品的用户体验达到极致。每一个成功的案例，都是我专业主义的注脚。"}],fontSize:"text-2xl"},{id:"education",title:"教育经历",icon:"GraduationCap",subtitle:"学术背景 & 持续学习",sections:[{title:"学术背景",content:"毕业于知名艺术设计学院，主修视觉传达设计。在校期间多次获得国际设计奖项，对当代艺术及设计思潮有敏锐的洞察力。"},{title:"持续学习",content:"教育背景为我提供了广阔的视野。除专业课外，我广泛涉猎社会学、心理学与建筑学，这些跨学科的知识极大地丰富了我的设计语料库。我相信设计是一场终身的修行。"}],fontSize:"text-2xl"}],skills:["品牌策略","交互设计","动态视觉","创意策划"]},contact:{title:"开启合作",subtitle:"无论是一个有趣的想法，还是一个宏大的愿景，我都期待与你共同探讨。",name:"姓名",email:"hello@pengwen.design",message:"留言",send:"发送信息",success:"信息已发送，我会尽快回复你！",phone:"12345678910",phoneLabel:"电话联系",wechat:"PengWen_Design",wechatLabel:"微信联系",socials:[{name:"小红书",url:"#",icon:"BookOpen"},{name:"B站",url:"#",icon:"Tv"},{name:"网易云音乐",url:"#",icon:"Music"},{name:"抖音",url:"#",icon:"Video"}]},footer:{slogan:"AI 快捷，高效",aboutTitle:"关于工作室",aboutText:"致力于通过极简设计和灵魂交互打造品牌身份。基于数字以太。",rights:"© 2026 PengWen Design. 保留所有权利。"}},en:{nav:{home:"Home",work:"Work",about:"About",contact:"Contact"},hero:{title:"PengWen Design Studio",subtitle:"Telling unique stories through warm and intentional design.",cta:"View My Work"},work:{title:"Work Categories",viewProject:"Learn More",categories:[{id:"brand",title:"Brand Story",subtitle:"Brand Identity",icon:"LayoutGrid",items:[{image:"https://picsum.photos/seed/brand/1200/800",annotation:"Core System Visualization: We condensed the brand's vitality into this pure geometric language, each line representing the tension of evolution."},{image:"https://picsum.photos/seed/brand1/1200/800",annotation:"Color Psychology Experiment: Through precise contrast of warm and cold tones, we build a professional yet warm primary visual impression for the brand."},{image:"https://picsum.photos/seed/brand2/1200/800",annotation:"Texture Extension: Across different media, the design lexicon maintains consistent sophistication and recognizability."}],content:"Telling the soul behind the brand through visual language. We don't just design logos; we build a complete emotional resonance system. Every successful brand has a story worth remembering."},{id:"motion",title:"Motion Graphics",subtitle:"Motion Graphics",icon:"Play",items:[{image:"https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJidHBndXF4bm9yeXpxbmx4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpx4A9IuNDvG/giphy.gif",annotation:"Minimalist Rhythm: This movement study explores the breath of pixels in non-linear space, acting as a bridge between interface and user emotion."},{image:"https://picsum.photos/seed/uiux/1200/800",annotation:"Interface Transition: More than a page switch—it's a visual logic guide, ensuring users never get lost in the fluid flow of information."}],content:"Making design 'come alive'. Through smooth dynamic interaction and cinematic camera language, we give life to static frames. In the fluid shadows and light, we accurately convey brand emotion and rhythm."},{id:"product",title:"Product Showcase",subtitle:"Product Showcase",icon:"Camera",items:[{image:"https://picsum.photos/seed/work_product/1000/1200",annotation:"Shadow Reconstruction: By capturing high-precision edge light, we showcase the unique 'cold aesthetic' of its industrial design."},{image:"https://picsum.photos/seed/product1/1000/1200",annotation:"Material Detail: The texture under a macro lens is the most silent yet solemn promise of the brand's commitment to excellence."}],content:"Details are everything. We are committed to excavating the most essential beauty of the product. Through minimalist layouts and high-quality visual presentation, the product exudes unique charm at every touchpoint."},{id:"more",title:"More",subtitle:"Explore More",icon:"MoreHorizontal",items:[{image:"https://picsum.photos/seed/work_more/1000/1200",annotation:"Digital Lab: This is an 'off-track' breakthrough in the field of visual art. Here, code and graphics no longer have boundaries."}],content:"Exploring infinite possibilities. Beyond regular business, we always maintain an exploration of cutting-edge visuals and experimental design. Here we record our bold attempts at the future."}]},about:{title:"About Me",intro:"Finding balance within the latitude and longitude of design.",categories:[{id:"profile",title:"Profile",icon:"User",subtitle:"Multi-disciplinary Designer / Visual Artist",sections:[{title:"Core Philosophy",content:"I'm PengWen, a cross-disciplinary creator. I believe design is more than visual communication—it's a dialogue between soul and space. I strive to give unique vitality to works through minimalist language."},{title:"Practice Principle",content:"Throughout my ten-year career, I have always adhered to the 'Less is More' principle. Every line and every color choice is intended to precisely capture the core value of a brand. I focus not just on aesthetics, but on the logic and warmth behind the work."}],fontSize:"text-2xl"},{id:"skills",title:"Skills",icon:"Code2",subtitle:"Design Tools & Frontend Tech",sections:[{title:"Technical Ability",content:"Proficient in Figma, Adobe Creative Suite, and other design tools. Solid foundation in UI/UX design, capable of full-process execution from prototyping to high-fidelity output. Deep understanding of frontend tech like React and Tailwind CSS."},{title:"Creative Implementation",content:"I excel at using technical means to visualize creativity. Whether it's the subtle calculation of responsive layouts or the pixel-level polishing of micro-interactive animations, these are skills I'm proud of. I don't just draw; I build the logic of interaction."}],fontSize:"text-2xl"},{id:"experience",title:"Experience",icon:"Briefcase",subtitle:"Professional History & Projects",sections:[{title:"Industry Focus",content:"Previously served as a UI Designer at a top design firm, leading multiple mobile projects with millions of users. Extensive experience in brand visual upgrades, excelling in creating business value through design."},{title:"Collaborative Leadership",content:"I know how to play a coordinating role for design in cross-team collaboration, ensuring the final product's user experience reaches its peak. Each successful case is a testament to my professionalism."}],fontSize:"text-2xl"},{id:"education",title:"Education",icon:"GraduationCap",subtitle:"Academic Background",sections:[{title:"Academic Background",content:"Graduated from a prestigious art and design college, majoring in Visual Communication Design. Won multiple international design awards during studies, with keen insights into contemporary art and design trends."},{title:"Continuous Learning",content:"My educational background has provided me with a broad perspective. Beyond my major, I've delved into sociology, psychology, and architecture. This interdisciplinary knowledge has greatly enriched my design vocabulary. I believe design is a lifelong practice."}],fontSize:"text-2xl"}],skills:["Brand Strategy","Interaction Design","Motion Graphics","Creative Planning"]},contact:{title:"Let's Connect",subtitle:"Whether it's a seed of an idea or a grand vision, I'd love to explore it with you.",name:"Name",email:"hello@pengwen.design",message:"Messa
